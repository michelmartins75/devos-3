name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_ADMIN_URL: postgresql://postgres:postgres@localhost:5432/postgres
      DATABASE_MIGRATOR_URL: postgresql://devos_migrator:devos_migrator@localhost:5432/devos_app
      DATABASE_API_URL: postgresql://devos_api:devos_api@localhost:5432/devos_app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Bootstrap Postgres roles
        run: |
          psql "$DATABASE_ADMIN_URL" -c "CREATE DATABASE devos_app;"
          psql "$DATABASE_ADMIN_URL" -c "CREATE DATABASE devos_audit;"
          psql "$DATABASE_ADMIN_URL" -d devos_app -f infra/postgres/init-roles.sql

      - name: Lint
        run: ruff check .

      - name: Typecheck
        run: pyright

      - name: Run migrations
        run: alembic -c infra/db/alembic.ini upgrade head

      - name: Sacred isolation tests
        run: pytest -m isolation

      - name: All tests
        run: pytest

      - name: Migration downgrade smoke
        run: |
          alembic -c infra/db/alembic.ini downgrade 0001_identity
          alembic -c infra/db/alembic.ini upgrade head

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t devos3-api:ci .
